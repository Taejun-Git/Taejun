{% extends 'base.html' %}  <!-- base.html 템플릿을 상속받아 공통 레이아웃을 사용한다. -->

{% block content %}  <!-- base.html 안에 정의된 content 블록 영역에 아래 내용을 삽입한다. -->
  <h2>Post Edit</h2>  <!-- 게시글 수정 페이지 제목을 표시한다. -->

  <form action="/posts/{{ post[0] }}/edit" method="post">  <!-- 게시글 수정 내용을 /posts/게시글id/edit 경로로 POST 방식 전송한다. -->
    Title:
    <br>
    <input type="text" id="title" name="title" value="{{ post[1] }}">  <!-- 기존 게시글 제목 post[1]을 입력창 기본값으로 보여준다. -->
    <br>
    <br>

    Content:
    <br>
    <textarea id="content" name="content">{{ post[2] }}</textarea>  <!-- 기존 게시글 내용 post[2]를 textarea 안에 보여준다. -->
    <br>

    <button>Edit</button>  <!-- 수정 폼을 제출하는 버튼이다. -->
  </form>

  <form action="/posts/{{ post[0] }}">  <!-- 현재 게시글 상세 페이지 /posts/게시글id 로 이동하는 폼이다. 기본 method는 GET이다. -->
    <button>Go to Post</button>  <!-- 게시글 상세 페이지로 이동하는 버튼이다. -->
  </form>
{% endblock %}  <!-- content 블록을 종료한다. -->
